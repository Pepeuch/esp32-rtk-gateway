name: Build firmware profiles

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      known_profile:
        description: "Known profile preset"
        required: true
        default: "waveshare_esp32s3_eth-base-eu868-unicore-sx1262-w5500-16mb-8mb"
        type: choice
        options:
          - waveshare_esp32s3_eth-base-eu868-unicore-sx1262-w5500-16mb-8mb
          - waveshare_esp32s3_eth-base-eu868-ublox-sx1262-w5500-16mb-8mb
          - mammotion_esp32s3_rtk-base-eu868-unicore-llcc68-none-8mb-none
          - generic_esp32_eth-base-eu868-ublox-none-lan8720-4mb-none
          - waveshare_esp32s3_eth-rover-eu868-unicore-sx1262-none-16mb-8mb
      profile_json:
        description: "Optional raw profile JSON string. When set, it overrides known_profile."
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IDF_VERSION: v5.5.3
      KNOWN_PROFILE: ${{ github.event.inputs.known_profile }}
      PROFILE_JSON_INPUT: ${{ github.event.inputs.profile_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: esp-idf-tools-${{ runner.os }}-${{ env.IDF_VERSION }}

      - name: Cache ESP-IDF source
        uses: actions/cache@v4
        with:
          path: ~/esp-idf
          key: esp-idf-source-${{ runner.os }}-${{ env.IDF_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ env.IDF_VERSION }}-${{ env.KNOWN_PROFILE }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.IDF_VERSION }}-
            ccache-${{ runner.os }}-

      - name: Install ESP-IDF
        shell: bash
        run: |
          if [ ! -d "$HOME/esp-idf/.git" ]; then
            git clone --recursive --branch "$IDF_VERSION" https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          else
            cd "$HOME/esp-idf"
            git fetch --tags
            git checkout "$IDF_VERSION"
            git submodule update --init --recursive
          fi

          "$HOME/esp-idf/install.sh"

      - name: Resolve build profile
        shell: bash
        run: |
          mkdir -p build
          if [ -n "$PROFILE_JSON_INPUT" ]; then
            printf '%s\n' "$PROFILE_JSON_INPUT" > build/profile.json
          else
            cp "configs/profiles/${KNOWN_PROFILE}.json" build/profile.json
          fi

          echo "Selected profile input:"
          cat build/profile.json

      - name: Validate profile build inputs
        shell: bash
        run: |
          chmod +x scripts/check_profile_build_inputs.sh
          ./scripts/check_profile_build_inputs.sh

      - name: Build firmware from profile
        shell: bash
        run: |
          source "$HOME/esp-idf/export.sh"
          export IDF_CCACHE_ENABLE=1
          chmod +x scripts/build_profile.sh
          ./scripts/build_profile.sh build/profile.json

      - name: Capture build outputs
        id: capture
        shell: bash
        run: |
          firmware_id="$(cat build/generated/firmware-id.txt)"
          firmware_dir="$(cat build/generated/firmware-dir.txt)"
          manifest_path="$(cat build/generated/manifest-path.txt)"

          echo "firmware_id=$firmware_id" >> "$GITHUB_OUTPUT"
          echo "firmware_dir=$firmware_dir" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$manifest_path" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.capture.outputs.firmware_id }}
          path: |
            ${{ steps.capture.outputs.firmware_dir }}/*
            ${{ steps.capture.outputs.manifest_path }}

      - name: Publish firmware to docs
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          firmware_id="${{ steps.capture.outputs.firmware_id }}"
          firmware_dir="${{ steps.capture.outputs.firmware_dir }}"
          manifest_path="${{ steps.capture.outputs.manifest_path }}"

          git add -f "$firmware_dir"/*.bin
          git add "$firmware_dir/profile.json"
          git add "$manifest_path"

          git commit -m "ci(firmware): publish $firmware_id" || echo "No firmware changes"
          git push origin main
