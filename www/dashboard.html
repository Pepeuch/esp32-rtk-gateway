<html>
<head>
    <title>ESP32 RTK Gateway Dashboard</title>
    <script src="jquery-3.4.1.min.js"></script>
    <script src="bs-4.3.1.bundle.min.js"></script>
    <link rel="stylesheet" href="bs-4.3.1.min.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <style>
        body {
            background: #f7f9fb;
        }

        .capability-pill {
            display: inline-block;
            margin: 0 8px 8px 0;
            padding: 4px 10px;
            border-radius: 999px;
            background: #eef3f7;
            font-size: 0.875rem;
        }

        .mono {
            font-family: monospace;
        }
    </style>
    <script>
        $(function() {
            var capabilitiesSummary = $('.capabilities-summary');
            var wifiSummary = $('.wifi-summary');
            var gnssSummary = $('.gnss-summary');
            var baseSummary = $('.base-summary');
            var ntripSummary = $('.ntrip-summary');
            var footerUptime = $('.footer-uptime');
            var footerHeap = $('.footer-heap');

            var secondsToHHMMSS = function(seconds) {
                seconds = parseInt(seconds || 0, 10);
                var hours = Math.floor(seconds / 3600);
                var minutes = Math.floor(seconds / 60) % 60;
                var secs = seconds % 60;
                return [hours, minutes, secs].map(function(v) {
                    return v < 10 ? '0' + v : '' + v;
                }).join(':');
            };

            var appendPill = function(container, text) {
                container.append($('<span>', {class: 'capability-pill', text: text}));
            };

            var renderWifi = function(wifi) {
                wifiSummary.empty();
                if (!wifi) {
                    wifiSummary.text('No network status available');
                    return;
                }

                if (wifi.ap && wifi.ap.active) {
                    appendPill(wifiSummary, 'AP ' + (wifi.ap.ssid || 'unnamed'));
                    appendPill(wifiSummary, wifi.ap.ip4 || 'no AP IP');
                    appendPill(wifiSummary, (wifi.ap.devices || 0) + ' AP client(s)');
                } else {
                    appendPill(wifiSummary, 'AP disabled');
                }

                if (wifi.sta && wifi.sta.active) {
                    appendPill(wifiSummary, wifi.sta.connected ? 'STA connected' : 'STA not connected');
                    appendPill(wifiSummary, wifi.sta.ssid || 'no SSID');
                    if (wifi.sta.ip4) {
                        appendPill(wifiSummary, wifi.sta.ip4);
                    }
                    if (typeof wifi.sta.rssi === 'number') {
                        appendPill(wifiSummary, wifi.sta.rssi + ' dBm');
                    }
                } else {
                    appendPill(wifiSummary, 'STA disabled');
                }
            };

            var renderGnss = function(gnss) {
                gnssSummary.empty();
                if (!gnss || !gnss.detected) {
                    gnssSummary.text('No GNSS data');
                    return;
                }

                appendPill(gnssSummary, gnss.receiver_type || 'unknown');
                appendPill(gnssSummary, gnss.model || 'unknown model');
                appendPill(gnssSummary, gnss.fix_type || 'unknown fix');
                appendPill(gnssSummary, 'RTK ' + (gnss.rtk_status || 'unknown'));
                appendPill(gnssSummary, (gnss.satellites_used || 0) + ' used / ' + (gnss.satellites_visible || 0) + ' visible');
                appendPill(gnssSummary, 'CN0 ' + (gnss.cn0_mean || 0) + '/' + (gnss.cn0_max || 0));
                appendPill(gnssSummary, gnss.rtcm_alive && !gnss.rtcm_stale ? 'RTCM alive' : (gnss.rtcm_stale ? 'RTCM stale' : 'RTCM idle'));
            };

            var renderCapabilities = function(cap) {
                capabilitiesSummary.empty();
                if (!cap) {
                    capabilitiesSummary.text('Capabilities unavailable');
                    return;
                }

                appendPill(capabilitiesSummary, cap.chip_family || 'unknown');
                appendPill(capabilitiesSummary, cap.network_profile || 'unknown network');
                appendPill(capabilitiesSummary, (cap.max_ntrip_slots || 0) + ' NTRIP slots');
                appendPill(capabilitiesSummary, cap.psram_available ? 'PSRAM' : 'No PSRAM');
                appendPill(capabilitiesSummary, cap.ethernet_active ? 'Ethernet active' : 'Wi-Fi only');
            };

            var renderBase = function(base) {
                baseSummary.empty();
                if (!base || !base.detected) {
                    baseSummary.text('No base station data');
                    return;
                }

                appendPill(baseSummary, 'Mode ' + (base.configured_mode || 'rover'));
                appendPill(baseSummary, 'Profile ' + (base.active_profile || 'none'));
                appendPill(baseSummary, 'RTCM ' + (base.rtcm_output ? 'on' : 'off'));
                appendPill(baseSummary, base.survey_running ? ('Survey ' + (base.survey_progress_percent || 0) + '%') : 'Survey idle');
                if (base.has_fixed_position) {
                    appendPill(baseSummary, 'Lat ' + ((base.latitude_e7 || 0) / 10000000).toFixed(7));
                    appendPill(baseSummary, 'Lon ' + ((base.longitude_e7 || 0) / 10000000).toFixed(7));
                }
            };

            var renderNtrip = function(ntrip) {
                ntripSummary.empty();
                if (!ntrip || !Array.isArray(ntrip.slots)) {
                    ntripSummary.text('NTRIP runtime unavailable');
                    return;
                }

                ntrip.slots.forEach(function(slot) {
                    var text = (slot.index + 1) + '. ' + (slot.name || 'slot') + ' - ' + (slot.status || 'unknown');
                    if (slot.disabled_reason) {
                        text += ' (' + slot.disabled_reason + ')';
                    }
                    ntripSummary.append($('<div>', {class: 'small mb-1', text: text}));
                });
            };

            var poll = function() {
                $.getJSON('status').done(function(data) {
                    if (!data) {
                        return;
                    }

                    footerUptime.text(secondsToHHMMSS(data.uptime || 0));
                    if (data.heap && data.heap.total) {
                        footerHeap.text(Math.round((data.heap.free || 0) / data.heap.total * 100) + '% free');
                    } else {
                        footerHeap.text('n/a');
                    }

                    renderCapabilities(data.capabilities);
                    renderWifi(data.wifi);
                    renderGnss(data.gnss);
                    renderNtrip(data.ntrip);
                }).always(function() {
                    setTimeout(poll, 3000);
                });

                $.getJSON('api/gnss/base/status').done(function(data) {
                    renderBase(data);
                });
            };

            poll();
        });
    </script>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1">ESP32 RTK Gateway</h2>
                <div class="text-muted">Lightweight live dashboard</div>
            </div>
            <div>
                <a class="btn btn-outline-secondary btn-sm" href="/dashboard.html">Dashboard</a>
                <a class="btn btn-outline-primary btn-sm" href="/config.html">Config</a>
                <a class="btn btn-outline-dark btn-sm" href="/advanced.html">Advanced</a>
                <a class="btn btn-outline-secondary btn-sm" href="/log.html">Logs</a>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="card mb-3">
                    <div class="card-header">Platform</div>
                    <div class="card-body capabilities-summary small text-muted">Loading platform profile...</div>
                </div>
                <div class="card mb-3">
                    <div class="card-header">Network</div>
                    <div class="card-body wifi-summary small text-muted">Loading network status...</div>
                </div>
                <div class="card mb-3">
                    <div class="card-header">NTRIP</div>
                    <div class="card-body ntrip-summary small text-muted">Loading NTRIP runtime...</div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card mb-3">
                    <div class="card-header">GNSS</div>
                    <div class="card-body gnss-summary small text-muted">Loading GNSS status...</div>
                </div>
                <div class="card mb-3">
                    <div class="card-header">Base Station</div>
                    <div class="card-body base-summary small text-muted">Loading base status...</div>
                </div>
            </div>
        </div>

        <footer class="pt-3 text-muted small">
            Uptime: <span class="footer-uptime mono">00:00:00</span>
            <span class="mx-2">|</span>
            Heap: <span class="footer-heap mono">n/a</span>
        </footer>
    </div>
</body>
</html>
