<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ESP32 RTK Gateway Logs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/app-lite.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>
<body class="bg-light">
    <div class="page-shell">
        <header class="page-header">
            <div>
                <h1 class="page-title">ESP32 RTK Gateway</h1>
                <p class="lead mb-0">Live device logs. Use one log page at a time for the lightest load on the target.</p>
            </div>
            <div id="top-nav"></div>
        </header>

        <main class="page-main stack">
            <section class="card">
                <div class="card-header">Live Logs</div>
                <div class="card-body stack">
                    <div class="toolbar">
                        <button type="button" class="btn btn-outline-secondary" id="log-reconnect">Reconnect</button>
                        <button type="button" class="btn btn-outline-secondary" id="log-clear">Clear</button>
                    </div>
                    <div id="log-status" class="small text-muted">Connecting to `/log`...</div>
                    <div id="log-reload-notice" class="notice notice-warning hidden">Another log page became active. Reload this tab or keep only the newest one open.</div>
                    <div class="table-responsive">
                        <table class="table table-sm table-striped">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Time</th>
                                    <th>Level</th>
                                    <th>Tag</th>
                                    <th>Comment</th>
                                </tr>
                            </thead>
                            <tbody id="log-rows"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/c/api.js"></script>
    <script src="/c/nav.js"></script>
    <script src="/c/log.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            window.WebUI.nav.render('logs');
            window.WebUI.logPage.init();
        });
    </script>
</body>
</html>
